<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="white"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#d4a574" stroke-width="2" opacity="0.7"/>
  
  <!-- Medical Cross with heartbeat -->
  <g transform="translate(100, 100)">
    <!-- Cross -->
    <rect x="-12" y="-42" width="24" height="84" rx="3" fill="#0a4d8c"/>
    <rect x="-42" y="-12" width="84" height="24" rx="3" fill="#0a4d8c"/>
    
    <!-- Heart shape overlay on cross -->
    <path d="M 0,18 C -18,2 -32,-8 -32,-22 C -32,-32 -24,-40 -14,-40 C -6,-40 0,-34 0,-26 C 0,-34 6,-40 14,-40 C 24,-40 32,-32 32,-22 C 32,-8 18,2 0,18 Z" 
          fill="#d4a574"/>
    
    <!-- Heartbeat line on heart -->
    <polyline points="-22,-20 -12,-20 -8,-28 -2,-12 4,-22 8,-20 22,-20" 
              fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="20" r="3" fill="#d4a574"/>
  <circle cx="100" cy="180" r="3" fill="#d4a574"/>
  <circle cx="20" cy="100" r="3" fill="#d4a574"/>
  <circle cx="180" cy="100" r="3" fill="#d4a574"/>
</svg>
